services:
  ring-ai:
    build:
      context: ./ring-ai
    restart: unless-stopped
    env_file: .env
    environment:
      RING_TOKEN_PATH: /data/ring-token.json
    command: npm run listen-smoke
    volumes:
      - ./ring-ai/data:/data

  face-sidecar:
    profiles: ["local-face"]  # only starts with: docker compose --profile local-face up
    image: ghcr.io/yourname/ring-ai-face:latest
    restart: unless-stopped
    volumes:
      - ./faces:/faces:ro   # known face images
    platform: linux/arm64   # also built for linux/amd64
